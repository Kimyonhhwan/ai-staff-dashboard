name: AI 수익노트 완전 자동 운영

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

env:
  DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

permissions:
  contents: write

jobs:
  auto-ops:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          pip install edge-tts pillow
      
      - name: AI Staff auto operations
        run: python auto_ops.py
      
      - name: Generate premium videos
        run: python make_video_premium.py || true
      
      - name: Upload videos
        uses: actions/upload-artifact@v4
        with:
          name: videos
          path: videos/*.mp4
          retention-days: 7
      
      - name: Commit results
        run: |
          git config user.name "AI Staff Bot"
          git config user.email "bot@ai-staff.robot"
          git add -A
          git diff --cached --quiet || git commit -m "auto: update state & videos [skip ci]"
          git push
